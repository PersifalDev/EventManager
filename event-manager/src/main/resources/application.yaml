server:
  port: 8082

spring:
  application:
    name: EventManager

  datasource:
    url: jdbc:postgresql://localhost:5435/eventdb
    username: event
    password: manager
    driver-class-name: org.postgresql.Driver

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/changelog-master.yaml

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  cache:
    type: redis
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s

  kafka:
    bootstrap-servers: localhost:9092

springdoc:
  swagger-ui:
    url: /openapi.yaml
    path: /swagger-ui.html

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

jwt:
  secret-key: BC394D294B33EF525867C6B171EFBC77074D28CCF485F48280B62AE7DF911F38
  lifetime: 86400000

app:
  location:
    default-page-size: 5
    default-page-number: 0

  cache:
    default-ttl: 30s
    events-ttl: 30s
    locations-ttl: 30s
    registrations-ttl: 30s
    users-ttl: 30s

scheduler:
  enabled: true
  event-status:
    fixed-delay-ms: 60000

kafka-topic: event-changed-topic
