server:
  port: 8083

spring:
  application:
    name: event-notificator

  datasource:
    url: jdbc:postgresql://localhost:5436/eventNotificationdb
    username: event
    password: notification
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  kafka:
    consumer:
      group-id: event-notificator-group
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.IntegerDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: ru.haritonenko.commonlibs.dto.notification.EventChangeKafkaMessage

kafka-topic: event-changed-topic

app:
  location:
    default-page-size: 5
    default-page-number: 0

jwt:
  secret-key: BC394D294B33EF525867C6B171EFBC77074D28CCF485F48280B62AE7DF911F38
  lifetime: 86400000


springdoc:
  swagger-ui:
    url: /event-notificator-openapi.yaml
    path: /swagger-ui.html


scheduler:
  enabled: true
  notifications:
    cleanup-cron: "0 */10 * * * *"
    ttl-days: 7